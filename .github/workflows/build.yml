name: Build & Push nanobot

on:
  schedule:
    - cron: '0 4 * * *'  # täglich 04:00 UTC
  workflow_dispatch:      # manuell auslösbar 

env:
  UPSTREAM_REPO: HKUDS/nanobot
  IMAGE_NAME: ghcr.io/tio-27/nanobot

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest upstream release
        id: upstream
        run: |
          TAG=$(curl -sf https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest \
            | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest upstream: $TAG"

      - name: Get last built version
        id: local
        run: |
          if [ -f last_built_version.txt ]; then
            echo "tag=$(cat last_built_version.txt)" >> $GITHUB_OUTPUT
          else
            echo "tag=none" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already up to date
        if: steps.upstream.outputs.tag == steps.local.outputs.tag
        run: |
          echo "Already at ${{ steps.upstream.outputs.tag }}, skipping build."
          exit 0

      - name: Clone upstream at release tag
        if: steps.upstream.outputs.tag != steps.local.outputs.tag
        run: |
          git clone --depth 1 --branch ${{ steps.upstream.outputs.tag }} \
            https://github.com/${{ env.UPSTREAM_REPO }}.git upstream

      - name: Inject channel extras into Dockerfile
        if: steps.upstream.outputs.tag != steps.local.outputs.tag
        run: |
          cat >> upstream/Dockerfile <<'EOF'

          # Added by tio-27/nanobot-docker — install optional channels
          USER root
          RUN pip install --no-cache-dir --break-system-packages \
              'nanobot-ai[discord,matrix,whatsapp]'
          USER nanobot
          EOF

      - name: Set up QEMU
        if: steps.upstream.outputs.tag != steps.local.outputs.tag
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.upstream.outputs.tag != steps.local.outputs.tag
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.upstream.outputs.tag != steps.local.outputs.tag
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.upstream.outputs.tag != steps.local.outputs.tag
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/tio-27/nanobot-docker
            org.opencontainers.image.upstream=https://github.com/${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.version=${{ steps.upstream.outputs.tag }}

      - name: Save built version
        if: steps.upstream.outputs.tag != steps.local.outputs.tag
        run: echo "${{ steps.upstream.outputs.tag }}" > last_built_version.txt

      - name: Commit version file
        if: steps.upstream.outputs.tag != steps.local.outputs.tag
        run: |
          git fetch
          git pull
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_built_version.txt
          git commit -m "build: ${{ steps.upstream.outputs.tag }}"
          git push
