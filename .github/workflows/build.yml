name: Build & Push nanobot

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  UPSTREAM_REPO: HKUDS/nanobot
  IMAGE_NAME: ghcr.io/tio-27/nanobot

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo "${{ env.UPSTREAM_REPO }}" --json tagName -q .tagName)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest upstream: $TAG"

      - name: Get last built version
        id: local
        run: |
          if [ -f last_built_version.txt ]; then
            echo "tag=$(cat last_built_version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if build needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" = "${{ steps.local.outputs.tag }}" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Already at ${{ steps.upstream.outputs.tag }}, skipping."
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Building ${{ steps.upstream.outputs.tag }} (was: ${{ steps.local.outputs.tag }})"
          fi

      - name: Clone upstream at release tag
        if: steps.check.outputs.needed == 'true'
        run: |
          git clone --depth 1 --branch "${{ steps.upstream.outputs.tag }}" \
            "https://github.com/${{ env.UPSTREAM_REPO }}.git" upstream

      - name: Inject tzdata and channel extras into Dockerfile
        if: steps.check.outputs.needed == 'true'
        run: |
          cat >> upstream/Dockerfile <<'EOF'
          # Added by tio-27/nanobot-docker — install tzdata + optional channels
          USER root
          RUN apt-get update && \
              apt-get install -y --no-install-recommends tzdata && \
              rm -rf /var/lib/apt/lists/*
          RUN pip install --no-cache-dir --break-system-packages \
              'nanobot-ai[discord,matrix,whatsapp]'
          USER nanobot
          EOF

      - name: Set up QEMU
        if: steps.check.outputs.needed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.check.outputs.needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/tio-27/nanobot-docker
            org.opencontainers.image.upstream=https://github.com/${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.version=${{ steps.upstream.outputs.tag }}

      - name: Commit version file
        if: steps.check.outputs.needed == 'true' && success()
        run: |
          echo "${{ steps.upstream.outputs.tag }}" > last_built_version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add last_built_version.txt
          git commit -m "build: ${{ steps.upstream.outputs.tag }}"
          git push
